name: 📱 Build Android APK
on:
  push:
    branches: [main, master]
    paths:
      - 'Android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: 'debug'
        options:
          - debug
          - release

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build APK (${{ inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: ☕ 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 设置 Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: ✅ 授予执行权限
        run: |
          chmod +x Android/gradlew 2>/dev/null || true

      - name: 🛠️ 生成 Gradle Wrapper
        working-directory: Android
        run: gradle wrapper --gradle-version 8.5

      - name: 🔨 编译 APK
        working-directory: Android
        run: |
          BUILD_TYPE="${{ inputs.build_type || 'debug' }}"
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: 📋 查看构建产物
        run: |
          echo "=== APK 文件列表 ==="
          find Android/app/build/outputs -name "*.apk" -exec ls -lh {} \;

      - name: 📤 上传 APK (Debug)
        if: ${{ (inputs.build_type || 'debug') == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: SIM终端管理-debug
          path: Android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 📤 上传 APK (Release)
        if: ${{ inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: SIM终端管理-release
          path: Android/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: 📊 构建摘要
        run: |
          echo "✅ APK 构建完成！"
          echo "可在 Actions 页面的 Artifacts 区域下载"
